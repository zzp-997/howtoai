schema: spec-driven

# Project context
# 项目上下文信息，创建 OpenSpec 工件时会参考这些内容
context: |
  ## 项目概述
  极智协同 - 企业办公协同移动端应用

  ## 技术栈
  - **前端框架**: Vue 3 + Composition API
  - **构建工具**: Vite 6
  - **UI组件库**: TDesign Mobile Vue（主）+ Vant（辅）
  - **状态管理**: Pinia + pinia-plugin-persistedstate
  - **路由**: Vue Router 4
  - **样式方案**: Tailwind CSS + Less + postcss-px-to-viewport（750设计稿）
  - **本地存储**: IndexedDB（数据持久化）
  - **工具库**: dayjs、lodash、axios

  ## 目录结构
  ```
  src/
  ├── views/          # 页面组件（按功能模块分目录）
  │   ├── home/       # 首页
  │   ├── login/      # 登录
  │   ├── meeting/    # 会议预定（admin/user子目录）
  │   ├── trip/       # 差旅出行
  │   ├── attendance/ # 考勤打卡
  │   ├── leave/      # 请假申请
  │   ├── todo/       # 待办任务
  │   ├── announcement/# 公告通知
  │   ├── document/   # 文档查询
  │   ├── expense/    # 报销申请
  │   ├── settings/   # 设置
  │   └── approval/   # 审批中心（管理员）
  ├── components/     # 公共组件（Root、Tabbar等）
  ├── db/             # IndexedDB 数据层
  │   ├── index.js    # 数据库初始化
  │   └── repositories/# 数据仓库（Repo模式）
  ├── store/          # Pinia 状态管理
  │   └── modules/    # 状态模块（user、settings、permission）
  ├── router/         # 路由配置
  ├── api/            # API 接口层
  ├── utils/          # 工具函数
  ├── style/          # 全局样式
  ├── directives/     # Vue 自定义指令
  └── types/          # TypeScript 类型定义
  ```

  ## 数据库表（IndexedDB）
  users, meeting_rooms, reservations, trips, leaves, attendances,
  make_up_requests, attendance_config, documents, document_categories,
  todos, announcements, user_preferences, trip_templates, city_configs,
  holiday_configs, document_view_logs, search_histories, expense_claims

  ## 业务模块
  - **用户端**: 会议预定、差旅出行、请假打卡、待办任务、公告通知、文档查询、智能推荐、报销申请
  - **管理端**: 会议室管理、审批中心、文档管理、考勤管理、公告管理

  ## 编码规范
  - 使用中文注释、中文提交信息
  - 变量名、函数名使用英文（camelCase）
  - CSS 使用 Tailwind 原子类，尺寸单位为 px（自动转 vw）
  - 组件使用 TDesign 或 Vant 组件优先
  - 数据操作通过 repositories 层

# Per-artifact rules
# 工件规则
rules:
  proposal:
    - 提案控制在 300 字以内
    - 必须包含"非目标"章节
    - 明确标注影响范围（用户端/管理端/两端）
  design:
    - 设计文档需包含数据流图
    - 涉及数据库变更需说明表结构变化
    - UI 变更需说明使用的组件库（TDesign/Vant）
  tasks:
    - 任务拆分粒度控制在 30 分钟内
    - 每个任务需标注文件路径
    - 优先标注核心任务的依赖关系
