name: 前端自动部署

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 获取版本信息
        id: version
        run: |
          echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "deploy_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "deployer=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 生成版本信息文件
        run: |
          cat > public/version.json <<EOF
          {
            "commit": "${{ steps.version.outputs.commit_hash }}",
            "message": "${{ steps.version.outputs.commit_msg }}",
            "deploy_time": "${{ steps.version.outputs.deploy_time }}",
            "deployer": "${{ steps.version.outputs.deployer }}"
          }
          EOF

      - name: 打包前端
        run: npm run build

      - name: 上传到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/*"
          target: "/opt/howtoai/frontend/dist"
          strip_components: 1

      - name: 重启 Nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/howtoai
            docker compose restart nginx
            echo "✅ 前端部署完成"

      - name: 验证部署
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            response=$(curl -s -o /dev/null -w "%{http_code}" https://aixt.coderzzp.top)
            if [ "$response" == "200" ]; then
              echo "✅ 前端访问正常"
            else
              echo "❌ 前端访问异常，状态码: $response"
              exit 1
            fi